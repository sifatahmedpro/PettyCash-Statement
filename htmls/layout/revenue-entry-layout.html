<!-- ============================================================
     revenue-entry-layout.html
     লেআউট টেমপ্লেট — রেভিনিউ এন্ট্রি পেজ
     ============================================================ -->

<div class="revenue-entry-wrapper">

    <!-- Header section -->
    <div class="revenue-entry-header">
        <div>
            <h1>রেভিনিউ এন্ট্রি</h1>
            <div class="revenue-entry-date" id="todayDate"></div>
        </div>
        <img src="https://raw.githubusercontent.com/sifatahmedpro/PettyCash-Statement/main/sales-16.png" 
             alt="Logo" style="width: 60px; height: 60px; object-fit: contain;">
    </div>

    <!-- Main form -->
    <form class="revenue-entry-form" id="revenueEntryForm">

        <!-- Date field (row 1) -->
        <div class="revenue-entry-row full">
            <div class="revenue-entry-field">
                <label for="entryDate">তারিখ *</label>
                <input type="date" id="entryDate" name="entryDate" required 
                       placeholder="তারিখ নির্বাচন করুন">
            </div>
        </div>

        <!-- Section: Opening balance -->
        <div class="revenue-entry-section">
            <div class="revenue-entry-section-title">জের ও খরচ</div>
        </div>

        <div class="revenue-entry-row three-col">
            <div class="revenue-entry-display">
                <label>পূর্বের জের</label>
                <div class="revenue-entry-display-value" id="previousBalance">০</div>
            </div>
            <div class="revenue-entry-field">
                <label for="todayExpense">আজকের খরচ</label>
                <input type="number" id="todayExpense" name="todayExpense" 
                       placeholder="0" min="0" step="0.01">
            </div>
            <div class="revenue-entry-display">
                <label>অবশিষ্ট</label>
                <div class="revenue-entry-display-value" id="remainingBalance">০</div>
            </div>
        </div>

        <!-- Section: Revenue -->
        <div class="revenue-entry-section">
            <div class="revenue-entry-section-title">নতুন প্রাপ্তি</div>
        </div>

        <div class="revenue-entry-row">
            <div class="revenue-entry-field">
                <label for="newRevenue">নতুন প্রাপ্তি</label>
                <input type="number" id="newRevenue" name="newRevenue" 
                       placeholder="0" min="0" step="0.01">
            </div>
            <div class="revenue-entry-field">
                <label for="revenueDetails">বিবরণ</label>
                <textarea id="revenueDetails" name="revenueDetails" 
                          rows="3" placeholder="প্রাপ্তির বিবরণ লিখুন..."></textarea>
            </div>
        </div>

        <!-- Summary section -->
        <div class="revenue-entry-summary">
            <div class="revenue-entry-summary-row">
                <span class="revenue-entry-summary-label">মোট জের:</span>
                <span class="revenue-entry-summary-value" id="summaryOpeningBalance">০</span>
            </div>
            <div class="revenue-entry-summary-row">
                <span class="revenue-entry-summary-label">মোট খরচ:</span>
                <span class="revenue-entry-summary-value" id="summaryExpense">০</span>
            </div>
            <div class="revenue-entry-summary-row">
                <span class="revenue-entry-summary-label">মোট প্রাপ্তি:</span>
                <span class="revenue-entry-summary-value" id="summaryRevenue">০</span>
            </div>
            <div class="revenue-entry-summary-row">
                <span class="revenue-entry-summary-label">চূড়ান্ত ব্যালেন্স:</span>
                <span class="revenue-entry-summary-value" id="summaryFinalBalance">০</span>
            </div>
        </div>

        <!-- Notes field -->
        <div class="revenue-entry-row full">
            <div class="revenue-entry-field">
                <label for="entryNotes">নোট</label>
                <textarea id="entryNotes" name="entryNotes" 
                          rows="3" placeholder="অতিরিক্ত নোট বা মন্তব্য..."></textarea>
            </div>
        </div>

        <!-- Action buttons -->
        <div class="revenue-entry-actions">
            <button type="button" class="btn-print" id="printBtn">
                <span>🖨️</span> প্রিন্ট
            </button>
            <button type="button" class="btn-edit" id="editBtn" style="display:none;">
                <span>✏️</span> সম্পাদনা
            </button>
            <button type="button" class="btn-delete" id="deleteBtn" style="display:none;">
                <span>🗑️</span> মুছুন
            </button>
            <button type="button" class="btn-cancel" id="cancelBtn">
                <span>✕</span> বাতিল
            </button>
            <button type="submit" class="btn-submit" id="submitBtn" style="background-color: #28a745; color: #ffffff; min-width: 120px;">
                <span>💾</span> সংরক্ষণ
            </button>
        </div>

    </form>

</div>

<!-- Inline styles for quick button styling if needed -->
<style>
    .btn-submit {
        padding: 14px 28px;
        border: none;
        border-radius: 6px;
        font-size: 16px;
        font-weight: 900;
        cursor: pointer;
        font-family: 'SolaimanLipi', 'Kalpurush', sans-serif;
        transition: all 0.3s ease;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
    }

    .btn-submit:hover {
        background-color: #218838 !important;
        box-shadow: 0 4px 12px rgba(40, 167, 69, 0.3);
        transform: translateY(-2px);
    }

    .btn-submit:active {
        transform: translateY(0);
    }
</style>
