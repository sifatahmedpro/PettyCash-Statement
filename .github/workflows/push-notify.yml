## ============================================================
## .github/workflows/push-notify.yml  —  v3.1
##
## Runs every 60 minutes between 06:00–22:00 Dhaka time
## (= 00:00–16:00 UTC). Resting hours are 23:00–06:00 Dhaka.
## The Node.js script itself also has an hour-range guard so
## accidental triggers outside hours are safe.
##
## CHANGED in v3.1:
##   - Interval changed from 30 min to 60 min
##   - ~495 runs/month → well within 2,000 min free tier
##
## HOW TO SET UP:
##   1. Go to your GitHub repo → Settings → Secrets and variables → Actions
##   2. Add these Repository Secrets:
##      - FIREBASE_PROJECT_ID
##      - FIREBASE_CLIENT_EMAIL
##      - FIREBASE_PRIVATE_KEY
##      - VAPID_PUBLIC_KEY
##      - VAPID_PRIVATE_KEY
##      - VAPID_SUBJECT        (e.g. mailto:you@gmail.com)
## ============================================================

name: Web Push Notifications

on:
  schedule:
    # Every 60 minutes from 00:00 UTC to 16:00 UTC
    # = 06:00–22:00 Dhaka (UTC+6). Resting hours 23:00–06:00 Dhaka are
    # also blocked inside send-push.js as a second safety layer.
    - cron: '0 0-16 * * *'  # 00:00–16:00 UTC = 06:00–22:00 Dhaka

  # Run manually from the Actions tab for testing
  workflow_dispatch:

jobs:
  send-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: push-worker

      - name: Send push notifications
        env:
          FIREBASE_PROJECT_ID:   ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY:  ${{ secrets.FIREBASE_PRIVATE_KEY }}
          FIREBASE_API_KEY:      ${{ secrets.FIREBASE_API_KEY }}
          VAPID_PUBLIC_KEY:      ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY:     ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT:         ${{ secrets.VAPID_SUBJECT }}
        run: node send-push.js
        working-directory: push-worker
