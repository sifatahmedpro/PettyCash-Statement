

name: Web Push Notifications

on:
  schedule:
    ## Each cron fires at :55 of the preceding UTC hour so the runner
    ## reaches send-push.js before the target Dhaka hour.  The script
    ## matches BOTH the cron-fire hour AND the following hour (see the
    ## "Check Dhaka time" step) to handle runners that cross :00.
    ##
    ##   cron UTC 23:55 → Dhaka 05:55 → slot Dhaka 06  advance-payment, manpower, policy-files
    ##   cron UTC 01:55 → Dhaka 07:55 → slot Dhaka 08  fund-archive, hbl-recovery, vat-tax
    ##   cron UTC 03:55 → Dhaka 09:55 → slot Dhaka 10  task-manager, office-issue, notesheet
    ##   cron UTC 05:55 → Dhaka 11:55 → slot Dhaka 12  lunch-allowance, transport-bill, business-stats
    ##   cron UTC 07:55 → Dhaka 13:55 → slot Dhaka 14  various-calculators, stationary-item, medical-bill
    ##   cron UTC 09:55 → Dhaka 15:55 → slot Dhaka 16  ta-bill, license-forwarding, premium-submit
    ##   cron UTC 11:55 → Dhaka 17:55 → slot Dhaka 18  personal-dues, personal-expense
    ##   cron UTC 13:55 → Dhaka 19:55 → slot Dhaka 20  donation, help, help-requisition
    ##   cron UTC 15:55 → Dhaka 21:55 → slot Dhaka 22  proposal-index, fpr-register, license-archive
    - cron: '55 23 * * *'   # Dhaka 06:00 → advance-payment · manpower · policy-files
    - cron: '55 1  * * *'   # Dhaka 08:00 → fund-archive · hbl-recovery · vat-tax
    - cron: '55 3  * * *'   # Dhaka 10:00 → task-manager · office-issue · notesheet
    - cron: '55 5  * * *'   # Dhaka 12:00 → lunch-allowance · transport-bill · business-stats
    - cron: '55 7  * * *'   # Dhaka 14:00 → various-calculators · stationary-item · medical-bill
    - cron: '55 9  * * *'   # Dhaka 16:00 → ta-bill · license-forwarding · premium-submit
    - cron: '55 11 * * *'   # Dhaka 18:00 → personal-dues · personal-expense
    - cron: '55 13 * * *'   # Dhaka 20:00 → donation · help · help-requisition
    - cron: '55 15 * * *'   # Dhaka 22:00 → proposal-index · fpr-register · license-archive

  ## Manual trigger from Actions tab for testing
  workflow_dispatch:
    inputs:
      force_send:
        description: 'Force send a single slot (nearest earlier) instead of all slots'
        required: false
        default: 'false'
      dry_run:
        description: 'Dry run — show what would be sent without actually sending'
        required: false
        default: 'false'
      reset_seen_today:
        description: 'Clear seen-today state so already-sent modules fire again (auto-set for manual runs)'
        required: false
        default: 'true'

concurrency:
  group: push-notifications
  cancel-in-progress: false  ## Never cancel a run mid-send

jobs:
  send-push:
    name: Send Module & Task Reminder Pushes
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── Step 1: Checkout ──────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── Step 2: Setup Node.js ─────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # No npm cache — avoids failure when package-lock.json path can't be resolved

      # ── Step 3: Install dependencies ──────────────────────────
      - name: Install dependencies
        run: |
          echo "📦 Installing dependencies..."
          npm install --no-audit --prefer-offline || npm install --no-audit
        working-directory: push-worker
        timeout-minutes: 5

      # ── Step 4: Validate secrets ───────────────────────────────
      - name: Validate configuration
        env:
          FIREBASE_PROJECT_ID:   ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY:  ${{ secrets.FIREBASE_PRIVATE_KEY }}
          FIREBASE_API_KEY:      ${{ secrets.FIREBASE_API_KEY }}
          VAPID_PUBLIC_KEY:      ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY:     ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT:         ${{ secrets.VAPID_SUBJECT }}
        run: |
          echo "🔍 Validating secrets..."

          required_secrets=(
            "FIREBASE_PROJECT_ID"
            "FIREBASE_CLIENT_EMAIL"
            "FIREBASE_PRIVATE_KEY"
            "FIREBASE_API_KEY"
            "VAPID_PUBLIC_KEY"
            "VAPID_PRIVATE_KEY"
            "VAPID_SUBJECT"
          )

          missing_secrets=()

          for secret in "${required_secrets[@]}"; do
            var_value="${!secret}"
            if [ -z "$var_value" ]; then
              missing_secrets+=("$secret")
              echo "❌ Missing: $secret"
            else
              echo "✅ Found:   $secret (${#var_value} chars)"
            fi
          done

          if [ ${#missing_secrets[@]} -gt 0 ]; then
            echo ""
            echo "⚠️  The following required secrets are not set:"
            for s in "${missing_secrets[@]}"; do
              echo "   - $s"
            done
            echo ""
            echo "Add them at: repo → Settings → Secrets and variables → Actions"
            exit 1
          fi

          echo ""
          echo "✅ All required secrets are present."

      # ── Step 5: Show current Dhaka time and active slot ───────
      - name: Check Dhaka time and active slot
        id: dhaka_time
        run: |
          utc_hour=$(date -u +%H | sed 's/^0//')   # strip leading zero → integer
          dhaka_hour=$(( (utc_hour + 6) % 24 ))

          ## Each case matches TWO Dhaka hours: the cron-fire hour (e.g. 5 for UTC 23:55→Dhaka 05:55)
          ## AND the target slot hour (e.g. 6 for Dhaka 06:00) so that a slow runner
          ## that crosses the :00 boundary still resolves the correct slot.
          ## e.g. cron fires at UTC 23:55 (Dhaka 05:55) but date runs at Dhaka 06:01 → matches "5|6".
          case $dhaka_hour in
            5|6)   slot_name="advance-payment · manpower · policy-files" ;;
            7|8)   slot_name="fund-archive · hbl-recovery · vat-tax" ;;
            9|10)  slot_name="task-manager · office-issue · notesheet" ;;
            11|12) slot_name="lunch-allowance · transport-bill · business-stats" ;;
            13|14) slot_name="various-calculators · stationary-item · medical-bill" ;;
            15|16) slot_name="ta-bill · license-forwarding · premium-submit" ;;
            17|18) slot_name="personal-dues · personal-expense" ;;
            19|20) slot_name="donation · help · help-requisition" ;;
            21|22) slot_name="proposal-index · fpr-register · license-archive" ;;
            *)     slot_name="(no scheduled slot — force_send or manual trigger required)" ;;
          esac

          ## Active = 06:00–24:00 Dhaka (ACTIVE_HOUR_END=24 in send-push.js CONFIG;
          ## the 22:00 slot cron fires at UTC 15:55 → Dhaka 21:55/22:xx, so
          ## hours 22 and 23 must be treated as active here too).
          if [ $dhaka_hour -ge 6 ] && [ $dhaka_hour -lt 24 ]; then
            is_active="true"
            status="🟢 Active"
          else
            is_active="false"
            status="🔴 Resting (00:00–06:00 Dhaka)"
          fi

          echo "is_active=$is_active"   >> $GITHUB_OUTPUT
          echo "dhaka_hour=$dhaka_hour" >> $GITHUB_OUTPUT
          echo "slot_name=$slot_name"   >> $GITHUB_OUTPUT

          echo "⏰ Time check:"
          echo "   UTC hour:   $utc_hour"
          echo "   Dhaka hour: $dhaka_hour"
          echo "   Status:     $status"
          echo "   Slot:       $slot_name"

      # ── Step 6: Send push notifications ───────────────────────
      - name: Send push notifications
        id: push_worker
        env:
          FIREBASE_PROJECT_ID:   ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY:  ${{ secrets.FIREBASE_PRIVATE_KEY }}
          FIREBASE_API_KEY:      ${{ secrets.FIREBASE_API_KEY }}
          VAPID_PUBLIC_KEY:      ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY:     ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT:         ${{ secrets.VAPID_SUBJECT }}
          FORCE_SEND:            ${{ github.event.inputs.force_send }}
          DRY_RUN:               ${{ github.event.inputs.dry_run }}
          RESET_SEEN_TODAY:      ${{ github.event.inputs.reset_seen_today || 'false' }}
          RUN_ID:                ${{ github.run_id }}
          WORKFLOW_RUN_NUMBER:   ${{ github.run_number }}
          GITHUB_ACTOR:          ${{ github.actor }}
          IS_MANUAL_TRIGGER:     ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          echo "🚀 Starting push notification worker (v5.8)..."
          echo ""
          echo "Run information:"
          echo "  Run ID:         $RUN_ID"
          echo "  Run Number:     $WORKFLOW_RUN_NUMBER"
          echo "  Triggered by:   $GITHUB_ACTOR"
          echo "  Manual trigger: $IS_MANUAL_TRIGGER"
          echo "  Force send:     $FORCE_SEND"
          echo "  Dry run:        $DRY_RUN"
          echo "  Slot:           ${{ steps.dhaka_time.outputs.slot_name }}"
          echo ""

          node send-push.js
          exit_code=$?

          echo ""
          echo "Worker exit code: $exit_code"
          echo "push_worker_exit_code=$exit_code" >> $GITHUB_OUTPUT

          exit $exit_code
        working-directory: push-worker
        timeout-minutes: 25
        continue-on-error: true

      # ── Step 7: Generate job summary ──────────────────────────
      - name: Generate job summary
        if: always()
        run: |
          utc_hour=$(date -u +%H | sed 's/^0//')
          dhaka_hour=$(( (utc_hour + 6) % 24 ))

          echo "# Web Push Notification Workflow — Summary"    >> $GITHUB_STEP_SUMMARY
          echo ""                                               >> $GITHUB_STEP_SUMMARY

          echo "## Run information"                            >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |"                             >> $GITHUB_STEP_SUMMARY
          echo "|---|---|"                                      >> $GITHUB_STEP_SUMMARY
          echo "| Run ID | ${{ github.run_id }} |"             >> $GITHUB_STEP_SUMMARY
          echo "| Run number | ${{ github.run_number }} |"     >> $GITHUB_STEP_SUMMARY
          echo "| Trigger | ${{ github.event_name }} |"        >> $GITHUB_STEP_SUMMARY
          echo "| Actor | ${{ github.actor }} |"               >> $GITHUB_STEP_SUMMARY
          echo "| Timestamp | $(date -u +'%Y-%m-%d %H:%M UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "| Force send | ${{ github.event.inputs.force_send || 'false' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dry run | ${{ github.event.inputs.dry_run || 'false' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Reset seen-today | ${{ github.event.inputs.reset_seen_today || 'auto' }} |" >> $GITHUB_STEP_SUMMARY
          echo ""                                               >> $GITHUB_STEP_SUMMARY

          echo "## Time and slot"                              >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |"                             >> $GITHUB_STEP_SUMMARY
          echo "|---|---|"                                      >> $GITHUB_STEP_SUMMARY
          echo "| UTC hour | $utc_hour |"                      >> $GITHUB_STEP_SUMMARY
          echo "| Dhaka hour | $dhaka_hour |"                  >> $GITHUB_STEP_SUMMARY
          echo "| Active slot | ${{ steps.dhaka_time.outputs.slot_name }} |" >> $GITHUB_STEP_SUMMARY
          echo ""                                               >> $GITHUB_STEP_SUMMARY

          echo "## Schedule reference"                         >> $GITHUB_STEP_SUMMARY
          echo "| Dhaka time | UTC cron | Modules |"           >> $GITHUB_STEP_SUMMARY
          echo "|---|---|---|"                                  >> $GITHUB_STEP_SUMMARY
          echo "| 06:00 | 23:55 (prev day) | advance-payment · manpower · policy-files |"            >> $GITHUB_STEP_SUMMARY
          echo "| 08:00 | 01:55 | fund-archive · hbl-recovery · vat-tax |"                >> $GITHUB_STEP_SUMMARY
          echo "| 10:00 | 03:55 | task-manager · office-issue · notesheet |"              >> $GITHUB_STEP_SUMMARY
          echo "| 12:00 | 05:55 | lunch-allowance · transport-bill · business-stats |"    >> $GITHUB_STEP_SUMMARY
          echo "| 14:00 | 07:55 | various-calculators · stationary-item · medical-bill |" >> $GITHUB_STEP_SUMMARY
          echo "| 16:00 | 09:55 | ta-bill · license-forwarding · premium-submit |"        >> $GITHUB_STEP_SUMMARY
          echo "| 18:00 | 11:55 | personal-dues · personal-expense |"                     >> $GITHUB_STEP_SUMMARY
          echo "| 20:00 | 13:55 | donation · help · help-requisition |"                       >> $GITHUB_STEP_SUMMARY
          echo "| 22:00 | 15:55 | proposal-index · fpr-register · license-archive |"      >> $GITHUB_STEP_SUMMARY
          echo ""                                               >> $GITHUB_STEP_SUMMARY

          echo "## Result"                                     >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.push_worker.outcome }}" == "success" ]; then
            echo "**Status: ✅ Success**"                      >> $GITHUB_STEP_SUMMARY
          else
            echo "**Status: ❌ Failed — check logs above**"    >> $GITHUB_STEP_SUMMARY
          fi

      # ── Step 8: Upload logs artifact ──────────────────────────
      - name: Upload workflow logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: push-notification-logs-${{ github.run_number }}
          path: |
            push-worker/logs/
            push-worker/*.log
          retention-days: 7
          if-no-files-found: ignore

      # ── Step 9: Notify Slack on failure (optional) ────────────
      - name: Notify Slack on failure
        if: failure() && github.event_name != 'workflow_dispatch'
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "❌ Web Push Notifications Failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*❌ Web Push Notifications Failed*\n\nRun #${{ github.run_number }}\nRepository: `${{ github.repository }}`\nSlot: `${{ steps.dhaka_time.outputs.slot_name }}`"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Triggered by:*\n${{ github.actor }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Event:*\n${{ github.event_name }}"
                    }
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": { "type": "plain_text", "text": "View Logs" },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL:  ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
        continue-on-error: true

      # ── Step 10: Send email on failure (optional) ─────────────
      - name: Send email notification on failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port:    ${{ secrets.MAIL_PORT }}
          username:       ${{ secrets.MAIL_USERNAME }}
          password:       ${{ secrets.MAIL_PASSWORD }}
          subject:        '❌ Web Push Workflow Failed — Run #${{ github.run_number }} (${{ steps.dhaka_time.outputs.slot_name }})'
          to:             ${{ secrets.FAILURE_NOTIFY_EMAIL || 'noreply@example.com' }}
          from:           'github-actions@officemanagement.app'
          body: |
            Web Push Notification workflow failed.

            Run details:
              Run Number  : ${{ github.run_number }}
              Repository  : ${{ github.repository }}
              Branch      : ${{ github.ref }}
              Triggered by: ${{ github.actor }}
              Event       : ${{ github.event_name }}
              Slot        : ${{ steps.dhaka_time.outputs.slot_name }}
              Timestamp   : $(date -u +'%Y-%m-%d %H:%M:%S UTC')

            View full logs:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            ---
            Automatic notification from GitHub Actions
        continue-on-error: true

      # ── Step 11: Final status ──────────────────────────────────
      - name: Final status check
        if: always()
        run: |
          echo ""
          echo "╔════════════════════════════════════════════╗"
          echo "║   Web Push Notification Workflow — End    ║"
          echo "╚════════════════════════════════════════════╝"
          echo ""
          echo "Slot: ${{ steps.dhaka_time.outputs.slot_name }}"
          echo ""

          if [ "${{ steps.push_worker.outcome }}" == "success" ]; then
            echo "✅ Workflow completed successfully"
            exit 0
          else
            echo "❌ Workflow failed — check logs above"
            exit 1
          fi
