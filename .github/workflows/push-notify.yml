## ============================================================
## .github/workflows/push-notify.yml  —  v2.0
##
## Runs every 30 minutes between 06:00–22:00 Dhaka time
## (= 00:00–16:00 UTC). The Node.js script itself also has an
## hour-range guard so accidental triggers outside hours are safe.
##
## NEW in v2:
##   - Runs all day (every 30 min) instead of 4 fixed hours
##   - Seen-today system: same status won't be pushed twice a day
##   - Snooze system: user can snooze reminders for 1 hour
##     from inside the app; the worker checks Firestore for it.
##
## HOW TO SET UP:
##   1. Go to your GitHub repo → Settings → Secrets and variables → Actions
##   2. Add these Repository Secrets:
##      - FIREBASE_PROJECT_ID
##      - FIREBASE_CLIENT_EMAIL
##      - FIREBASE_PRIVATE_KEY
##      - VAPID_PUBLIC_KEY
##      - VAPID_PRIVATE_KEY
##      - VAPID_SUBJECT        (e.g. mailto:you@gmail.com)
## ============================================================

name: Web Push Notifications

on:
  schedule:
    # Every 30 minutes from 00:00 UTC to 16:00 UTC
    # = 05:00–23:59 Dhaka (UTC+6). Resting hours 00:00–05:00 Dhaka are
    # also blocked inside send-push.js as a second safety layer.
    - cron: '0,30 23 * * *'    # 23:00–23:30 UTC = 05:00–05:30 Dhaka
    - cron: '0,30 0-17 * * *'  # 00:00–17:30 UTC = 06:00–23:30 Dhaka

  # Run manually from the Actions tab for testing
  workflow_dispatch:

jobs:
  send-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: push-worker

      - name: Send push notifications
        env:
          FIREBASE_PROJECT_ID:   ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY:  ${{ secrets.FIREBASE_PRIVATE_KEY }}
          FIREBASE_API_KEY:      ${{ secrets.FIREBASE_API_KEY }}
          VAPID_PUBLIC_KEY:      ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY:     ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT:         ${{ secrets.VAPID_SUBJECT }}
        run: node send-push.js
        working-directory: push-worker
