# ============================================================
# Layer 2 — Automatic off-platform full database backup
# ============================================================
# This is the piece that actually behaves like a "Windows Restore
# Point": it runs on a schedule with NO action from you, connects
# directly to Postgres (not through the browser/RLS at all), and
# dumps EVERYTHING — schema, data, every table, functions, RLS
# policies — into a single file stored outside Supabase entirely.
#
# ── ONE-TIME SETUP (do this before the workflow can run) ──────
#
# 1. Get the right connection string (IMPORTANT — not the default one):
#    Supabase Dashboard → Project Settings → Database → Connection string
#    → choose the "Session pooler" tab (NOT "Direct connection").
#    On the free tier, the Direct connection only resolves over IPv6,
#    which GitHub's runners cannot reach — the Session pooler string
#    works over IPv4 and is the one that will actually work here.
#
# 2. Add it as a GitHub secret (never put it in this file, never
#    paste it anywhere public):
#    Your repo → Settings → Secrets and variables → Actions →
#    New repository secret → name it SUPABASE_DB_URL → paste the
#    connection string (with your real password in it) → Save.
#
# 3. Make sure this repo is PRIVATE. The backup files this produces
#    contain your real business data.
#
# 4. Put this file at: .github/workflows/supabase-backup.yml
#
# That's it — no server, no VPS, nothing else to maintain.
#
# ── WHAT YOU GET ────────────────────────────────────────────────
# Every run produces one .sql file containing the full `public`
# schema (structure + data, in plain SQL you could replay with
# `psql` into a brand new Supabase project if disaster ever struck)
# and uploads it as a downloadable GitHub Actions artifact, kept
# for 90 days. You can also trigger a backup manually any time from
# the "Actions" tab → this workflow → "Run workflow" — that's your
# "take a restore point right now before I do something risky" button,
# the off-platform equivalent of Section 1 in your app's UI.
# ============================================================

name: Supabase Full Database Backup

on:
  schedule:
    # Runs daily at 18:00 UTC. Change the time to whatever suits you —
    # https://crontab.guru helps if you want a different schedule.
    - cron: '0 18 * * *'
  workflow_dispatch: {}   # adds a manual "Run workflow" button in the Actions tab

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Install PostgreSQL client tools
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-common
          sudo /usr/share/postgresql-common/pgdg/apt.postgresql.org.sh -y
          sudo apt-get install -y postgresql-client-17

      - name: Dump full public schema (structure + data)
        env:
          PGCONNECT_TIMEOUT: '30'
        run: |
          pg_dump "${{ secrets.SUPABASE_DB_URL }}" \
            --no-owner --no-privileges \
            -n public \
            -f "supabase_backup_$(date +%Y-%m-%d_%H-%M-%S).sql"
          ls -lh supabase_backup_*.sql

      - name: Upload backup as a workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: supabase-backup-${{ github.run_id }}
          path: supabase_backup_*.sql
          retention-days: 90

# ============================================================
# OPTIONAL: also dump auth/storage metadata
# ────────────────────────────────────────────
# Add  -n auth -n storage  to the pg_dump line above if you also
# want login-account and file-metadata tables included. Try it
# manually first (Actions tab → Run workflow) — on some hosted
# Supabase projects the connection role doesn't have permission to
# read every object in those schemas, and the job will fail loudly
# rather than silently, so you'll know right away if it's not
# possible for your project.
#
# STILL NOT COVERED EVEN BY THIS WORKFLOW:
# - The actual files inside Supabase Storage buckets (only metadata
#   rows are in the database — the file bytes live in object storage
#   and need a separate download script).
# - Auth user passwords are stored as hashes only by design — this
#   backs up the hashes (so accounts still work after a restore) but
#   cannot recover a literal password.
# ============================================================
