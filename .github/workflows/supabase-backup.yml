# ============================================================
# Layer 2 — Automatic off-platform full database backup
# ============================================================
name: Supabase Full Database Backup

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch: {}

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Install PostgreSQL 17 client tools
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg2 lsb-release
          wget -qO- https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo tee /etc/apt/trusted.gpg.d/pgdg.asc > /dev/null
          echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17
          /usr/lib/postgresql/17/bin/pg_dump --version

      - name: Dump full public schema (structure + data)
        env:
          PGCONNECT_TIMEOUT: '30'
        run: |
          /usr/lib/postgresql/17/bin/pg_dump "${{ secrets.SUPABASE_DB_URL }}" \
            --no-owner --no-privileges \
            -n public \
            -f "supabase_backup_$(date +%Y-%m-%d_%H-%M-%S).sql"
          ls -lh supabase_backup_*.sql

      - name: Upload backup as a workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: supabase-backup-${{ github.run_id }}
          path: supabase_backup_*.sql
          retention-days: 90
