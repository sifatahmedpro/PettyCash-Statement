# ============================================================
# .github/workflows/send-email.yml  —  v3.0 (SCHEDULED PER-PAGE)
#
# SCHEDULE (Dhaka UTC+6 → subtract 6 for UTC):
#   Crons fire at :55 of the preceding UTC hour to beat GitHub's
#   peak-congestion delay and arrive on time in Dhaka.
#
#    9:55 AM Dhaka = 03:55 UTC  → Help (টাস্ক তালিকা)        arrives ~10:00 AM
#   11:55 AM Dhaka = 05:55 UTC  → Office Issue (সমস্যা ও সমাধান) arrives ~12:00 PM
#    1:55 PM Dhaka = 07:55 UTC  → Business Stats (ব্যবসা পরিসংখ্যান) arrives ~2:00 PM
#    3:55 PM Dhaka = 09:55 UTC  → Premium Submit (প্রিমিয়াম জমা) arrives ~4:00 PM
#    5:55 PM Dhaka = 11:55 UTC  → Advance Payment (অগ্রিম পরিশোধ) arrives ~6:00 PM
#    7:55 PM Dhaka = 13:55 UTC  → Donation (অনুদান)           arrives ~8:00 PM
#
#   SILENT HOURS: 10 PM – 10 AM Dhaka (no emails sent)
#
# The PAGE environment variable tells send-email.js which
# single page to process in each run.
#
# HOW TO SET UP:
#   GitHub repo → Settings → Secrets and variables → Actions
#   Add these Repository Secrets:
#     - FIREBASE_PROJECT_ID
#     - FIREBASE_CLIENT_EMAIL
#     - FIREBASE_PRIVATE_KEY
#     - GMAIL_USER            ← your Gmail address
#     - GMAIL_APP_PASSWORD    ← 16-character App Password from Google
# ============================================================

name: Email Digest

on:
  schedule:
    - cron: '55 3 * * *'   #  9:55 AM Dhaka  → Help            (arrives ~10:00 AM)
    - cron: '55 5 * * *'   # 11:55 AM Dhaka  → Office Issue    (arrives ~12:00 PM)
    - cron: '55 7 * * *'   #  1:55 PM Dhaka  → Business Stats  (arrives  ~2:00 PM)
    - cron: '55 9 * * *'   #  3:55 PM Dhaka  → Premium Submit  (arrives  ~4:00 PM)
    - cron: '55 11 * * *'  #  5:55 PM Dhaka  → Advance Payment (arrives  ~6:00 PM)
    - cron: '55 13 * * *'  #  7:55 PM Dhaka  → Donation        (arrives  ~8:00 PM)

  # Run manually from the Actions tab for testing
  workflow_dispatch:
    inputs:
      page:
        description: 'Page to send (help / office_issue / business_stats / premium_submit / advance_payment / donation). Leave blank to auto-detect from current hour.'
        required: false
        default: ''

jobs:
  send-email:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd email-worker
          npm install

      - name: Determine which page to send
        id: page
        run: |
          # If manually triggered with a page input, use it.
          # Otherwise derive from current UTC hour (each cron has a unique hour).
          INPUT_PAGE="${{ github.event.inputs.page }}"
          UTC_HOUR=$(date -u +"%H" | sed 's/^0*//')   # strip leading zero → plain int

          if [ -n "$INPUT_PAGE" ]; then
            echo "PAGE=$INPUT_PAGE" >> $GITHUB_OUTPUT
          else
            case "$UTC_HOUR" in
              4)  echo "PAGE=help"             >> $GITHUB_OUTPUT ;;
              6)  echo "PAGE=office_issue"     >> $GITHUB_OUTPUT ;;
              8)  echo "PAGE=business_stats"   >> $GITHUB_OUTPUT ;;
              10) echo "PAGE=premium_submit"   >> $GITHUB_OUTPUT ;;
              12) echo "PAGE=advance_payment"  >> $GITHUB_OUTPUT ;;
              14) echo "PAGE=donation"         >> $GITHUB_OUTPUT ;;
              *)  echo "PAGE=help"             >> $GITHUB_OUTPUT ;;
            esac
          fi

      - name: Run email worker
        env:
          FIREBASE_PROJECT_ID:   ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY:  ${{ secrets.FIREBASE_PRIVATE_KEY }}
          GMAIL_USER:            ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:    ${{ secrets.GMAIL_APP_PASSWORD }}
          TARGET_PAGE:           ${{ steps.page.outputs.PAGE }}
        run: node email-worker/send-email.js
