# ============================================================
# .github/workflows/send-email.yml  —  v3.0 (SCHEDULED PER-PAGE)
#
# SCHEDULE (Dhaka UTC+6 → subtract 6 for UTC):
#   10:00 AM Dhaka = 04:00 UTC  → Help (টাস্ক তালিকা)
#   12:00 PM Dhaka = 06:00 UTC  → Office Issue Solution (সমস্যা ও সমাধান)
#    2:00 PM Dhaka = 08:00 UTC  → Business Statistics (ব্যবসা পরিসংখ্যান)
#    4:00 PM Dhaka = 10:00 UTC  → Premium Submit (প্রিমিয়াম জমা)
#    6:00 PM Dhaka = 12:00 UTC  → Advance Payment (অগ্রিম পরিশোধ)
#    8:00 PM Dhaka = 14:00 UTC  → Donation (অনুদান)
#
#   SILENT HOURS: 10 PM – 10 AM Dhaka (no emails sent)
#
# The PAGE environment variable tells send-email.js which
# single page to process in each run.
#
# HOW TO SET UP:
#   GitHub repo → Settings → Secrets and variables → Actions
#   Add these Repository Secrets:
#     - FIREBASE_PROJECT_ID
#     - FIREBASE_CLIENT_EMAIL
#     - FIREBASE_PRIVATE_KEY
#     - GMAIL_USER            ← your Gmail address
#     - GMAIL_APP_PASSWORD    ← 16-character App Password from Google
# ============================================================

name: Email Digest

on:
  schedule:
    - cron: '0 4 * * *'    # 10:00 AM Dhaka → Help
    - cron: '0 6 * * *'    # 12:00 PM Dhaka → Office Issue Solution
    - cron: '0 8 * * *'    #  2:00 PM Dhaka → Business Statistics
    - cron: '0 10 * * *'   #  4:00 PM Dhaka → Premium Submit
    - cron: '0 12 * * *'   #  6:00 PM Dhaka → Advance Payment
    - cron: '0 14 * * *'   #  8:00 PM Dhaka → Donation

  # Run manually from the Actions tab for testing
  workflow_dispatch:
    inputs:
      page:
        description: 'Page to send (help / office_issue / business_stats / premium_submit / advance_payment / donation). Leave blank to auto-detect from current hour.'
        required: false
        default: ''

jobs:
  send-email:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd email-worker
          npm install

      - name: Determine which page to send
        id: page
        run: |
          # If manually triggered with a page input, use it.
          # Otherwise derive from current UTC hour (each cron has a unique hour).
          INPUT_PAGE="${{ github.event.inputs.page }}"
          UTC_HOUR=$(date -u +"%H" | sed 's/^0*//')   # strip leading zero → plain int

          if [ -n "$INPUT_PAGE" ]; then
            echo "PAGE=$INPUT_PAGE" >> $GITHUB_OUTPUT
          else
            case "$UTC_HOUR" in
              4)  echo "PAGE=help"             >> $GITHUB_OUTPUT ;;
              6)  echo "PAGE=office_issue"     >> $GITHUB_OUTPUT ;;
              8)  echo "PAGE=business_stats"   >> $GITHUB_OUTPUT ;;
              10) echo "PAGE=premium_submit"   >> $GITHUB_OUTPUT ;;
              12) echo "PAGE=advance_payment"  >> $GITHUB_OUTPUT ;;
              14) echo "PAGE=donation"         >> $GITHUB_OUTPUT ;;
              *)  echo "PAGE=help"             >> $GITHUB_OUTPUT ;;
            esac
          fi

      - name: Run email worker
        env:
          FIREBASE_PROJECT_ID:   ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY:  ${{ secrets.FIREBASE_PRIVATE_KEY }}
          GMAIL_USER:            ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:    ${{ secrets.GMAIL_APP_PASSWORD }}
          TARGET_PAGE:           ${{ steps.page.outputs.PAGE }}
        run: node email-worker/send-email.js
