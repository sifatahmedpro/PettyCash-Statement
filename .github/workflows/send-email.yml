

name: Email Digest

on:
  schedule:
    - cron: '55 3 * * *'   #  9:55 AM Dhaka  → Help            (arrives ~10:00 AM)
    - cron: '55 5 * * *'   # 11:55 AM Dhaka  → Office Issue    (arrives ~12:00 PM)
    - cron: '55 7 * * *'   #  1:55 PM Dhaka  → Business Stats  (arrives  ~2:00 PM)
    - cron: '55 9 * * *'   #  3:55 PM Dhaka  → Premium Submit  (arrives  ~4:00 PM)
    - cron: '55 11 * * *'  #  5:55 PM Dhaka  → Advance Payment (arrives  ~6:00 PM)
    - cron: '55 13 * * *'  #  7:55 PM Dhaka  → Donation        (arrives  ~8:00 PM)

  # Run manually from the Actions tab for testing
  workflow_dispatch:
    inputs:
      page:
        description: 'Page to send (help / office_issue / business_stats / premium_submit / advance_payment / donation). Leave blank to auto-detect from current hour.'
        required: false
        default: ''

jobs:
  send-email:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd email-worker
          npm install

      - name: Determine which page to send
        id: page
        run: |
          # If manually triggered with a page input, use it.
          # Otherwise derive from current UTC hour (each cron has a unique hour).
          #
          # Each case matches TWO hours: the cron-fire hour (e.g. 3 for 03:55)
          # AND the following hour (e.g. 4 for 04:01) so that a slow runner
          # that crosses the :00 boundary still resolves the correct page
          # instead of silently falling through to the default.
          INPUT_PAGE="${{ github.event.inputs.page }}"
          UTC_HOUR=$(date -u +"%H" | sed 's/^0*//')   # strip leading zero → plain int

          if [ -n "$INPUT_PAGE" ]; then
            echo "PAGE=$INPUT_PAGE" >> $GITHUB_OUTPUT
          else
            case "$UTC_HOUR" in
              3|4)   echo "PAGE=help"             >> $GITHUB_OUTPUT ;;
              5|6)   echo "PAGE=office_issue"     >> $GITHUB_OUTPUT ;;
              7|8)   echo "PAGE=business_stats"   >> $GITHUB_OUTPUT ;;
              9|10)  echo "PAGE=premium_submit"   >> $GITHUB_OUTPUT ;;
              11|12) echo "PAGE=advance_payment"  >> $GITHUB_OUTPUT ;;
              13|14) echo "PAGE=donation"         >> $GITHUB_OUTPUT ;;
              *)     echo "⚠️  Unrecognised UTC hour ($UTC_HOUR) — falling back to help" >&2
                     echo "PAGE=help"             >> $GITHUB_OUTPUT ;;
            esac
          fi

      - name: Run email worker
        env:
          FIREBASE_PROJECT_ID:   ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY:  ${{ secrets.FIREBASE_PRIVATE_KEY }}
          GMAIL_USER:            ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:    ${{ secrets.GMAIL_APP_PASSWORD }}
          TARGET_PAGE:           ${{ steps.page.outputs.PAGE }}
        run: node email-worker/send-email.js
